<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WRIVON brand assets</title>
<style>
  body { background: #14121F; color: #e0e0e0; font-family: 'SF Pro Display', Inter, 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 40px; }
  h1 { font-weight: 700; font-size: 20px; letter-spacing: -0.3px; color: #2DE1C2; margin: 0 0 8px; }
  p { color: #888; font-size: 13px; margin: 0 0 32px; }
  .grid { display: flex; flex-wrap: wrap; gap: 40px; }
  .card { background: #1e1b2e; border-radius: 12px; padding: 24px; text-align: center; }
  .card svg { display: block; }
  .card .label { margin-top: 12px; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>
  <h1>WRIVON brand assets</h1>
  <p>logo-icon.svg • logo-full.svg • logo-mono.svg • favicon-32.png • favicon-64.png</p>
  <div class="grid">
    <div class="card">
      <img src="logo-icon.svg" width="200" height="200" alt="WRIVON icon">
      <div class="label">logo-icon.svg (400×400)</div>
    </div>
    <div class="card" style="text-align:left;">
      <img src="logo-full.svg" width="560" height="160" alt="WRIVON full lockup">
      <div class="label" style="text-align:center;">logo-full.svg (560×160)</div>
    </div>
    <div class="card">
      <img src="logo-mono.svg" width="200" height="200" alt="WRIVON mono" style="background:#fff;border-radius:8px;padding:12px;">
      <div class="label">logo-mono.svg (white on any bg)</div>
    </div>
  </div>
</body>
</html>
