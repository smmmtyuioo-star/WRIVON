<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160">
  <!--
    WRIVON logo-full — icon + wordmark lockup for README header / website.
    Lowercase "wrivon" in bold geometric sans, followed by a terminal cursor block.
  -->
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2DE1C2"/>
      <stop offset="100%" stop-color="#8B7FFF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="560" height="160" rx="16" fill="#14121F"/>

  <!-- Icon (scaled-down 400px W) -->
  <g transform="translate(12,12) scale(0.34)">
    <path d="M 60,140 L 130,290 L 200,140 L 270,290 L 340,140"
          fill="none" stroke="url(#wg)" stroke-width="28"
          stroke-linecap="square" stroke-linejoin="miter" stroke-miterlimit="4"/>
  </g>

  <!-- Wordmark "wrivon" — lowercase, bold, tight tracking -->
  <text x="160" y="100"
        font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', 'Arial', sans-serif"
        font-weight="700" font-size="52"
        letter-spacing="-1.5"
        fill="#2DE1C2"
        text-anchor="start" dominant-baseline="central">
    wrivon
  </text>

  <!-- Terminal cursor accent block (blinking block cursor) -->
  <rect x="340" y="75" width="16" height="28" rx="2" fill="#2DE1C2" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0.25;0.85" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
